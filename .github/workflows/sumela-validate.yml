name: SumelaOS Validate

# Enforces the SumelaOS structure contract on every push / PR so the framework
# (skills, rules, registries, wiki templates, generated AGENTS.md / RULE_REGISTRY)
# cannot silently drift. Mirrors `scripts/validate-structure.sh` — the same check
# the pre-commit hook runs locally. Also runs `tests/smoke.sh`, an end-to-end check
# that setup.sh renders + registers correctly and is idempotent on re-run.
#
# Not on GitHub? See docs/second-brain/template/ADOPTION_GUIDE.md for a GitLab CI
# / Azure Pipelines equivalent (both just run the same script).

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SumelaOS structure (+ unfilled placeholders)
        run: bash scripts/validate-structure.sh --check-placeholders

      - name: Setup smoke test (end-to-end — runs setup against a throwaway copy)
        run: bash tests/smoke.sh

      - name: IDE mirror drift check (no-op unless .sumela/mirrors.conf lists mirrors)
        run: bash scripts/sync-mirrors.sh --check

      - name: Shell script syntax check
        run: |
          set -e
          for f in scripts/*.sh tests/*.sh; do
            [ -f "$f" ] && bash -n "$f"
          done
          # Git hooks have no .sh extension; lint them explicitly if present.
          for h in .sumela/git-hooks/_lib.sh .sumela/git-hooks/pre-commit \
                   .sumela/git-hooks/post-merge .sumela/git-hooks/post-checkout; do
            [ -f "$h" ] && bash -n "$h"
          done

      - name: PowerShell script parse check
        shell: pwsh
        run: |
          $bad = 0
          Get-ChildItem -Recurse -Filter *.ps1 -ErrorAction SilentlyContinue | ForEach-Object {
            $tokens = $null; $errs = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errs)
            if ($errs) {
              Write-Host "::error::Parse errors in $($_.FullName)"
              $errs | ForEach-Object { Write-Host "  $($_.Extent.StartLineNumber): $($_.Message)" }
              $bad = 1
            }
          }
          if ($bad) { exit 1 } else { Write-Host "PowerShell scripts parse clean." }
